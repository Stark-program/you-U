services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: youu
      POSTGRES_PASSWORD: youu
      POSTGRES_DB: youu
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U youu -d youu']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
